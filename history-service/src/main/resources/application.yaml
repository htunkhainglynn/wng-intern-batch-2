spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: org.wavemoney.history.api.dto.event.TransactionEvent

  data:
    mongodb:
      auto-index-creation: true

  mongodb:
    uri: mongodb://admin:password@localhost:27018/history?authSource=admin

server:
  port: 8083

app:
  kafka:
    topics:
      cash-in-events: payment.cashin.events
      adjustment-events: payment.adjustment.events
      transaction-events: payment.transaction.events

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.wavemoney.notification: DEBUG
